name: PR Check — supplier-service

on:
  push:
    branches: ['feat-*', 'fix-*', 'chore-*']
    paths:
      - 'supplier-service/**'
      - '.github/workflows/ci-pr-supplier-service.yml'
  pull_request:
    branches: [develop]
    paths:
      - 'supplier-service/**'

permissions:
  contents: read
  pull-requests: read
  security-events: write
  actions: read

jobs:
  pr-check:
    uses: ./.github/workflows/_java-pr-check.yml
    with:
      service-name: supplier-service
      service-dir: supplier-service
      needs-database: true
    secrets: inherit
