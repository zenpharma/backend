server:
  port: 8081

spring:
  application:
    name: auth-service
  datasource:
    url: "jdbc:postgresql://${DB_HOST:localhost}:${DB_PORT:5432}/${DB_NAME:pharmadb}?currentSchema=auth"
    username: "${DB_USERNAME:pharma}"
    password: "${DB_PASSWORD:pharma123}"
    driver-class-name: org.postgresql.Driver
  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false
    properties:
      hibernate:
        default_schema: auth
  flyway:
    enabled: true
    schemas: auth
    locations: classpath:db/migration

jwt:
  secret: "${JWT_SECRET:default-dev-secret-key-must-be-32-chars}"
  expiration-ms: 86400000

management:
  endpoints:
    web:
      exposure:
        include: health,info,prometheus,metrics
  endpoint:
    health:
      show-details: always
  metrics:
    export:
      prometheus:
        enabled: true

logging:
  level:
    com.pharma: "${LOG_LEVEL:INFO}"
